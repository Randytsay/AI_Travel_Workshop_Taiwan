<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>講師後台 | AI 旅遊規劃工作坊</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stat-card {
            background: white;
            border: 1px solid var(--color-stone-200);
            border-radius: var(--radius-lg);
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        .stat-card .value {
            font-size: 1.5rem;
            line-height: 1;
            font-weight: 700;
            color: var(--color-primary);
        }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--color-stone-500);
        }

        .time-block {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--color-stone-50);
            border-radius: var(--radius-lg);
            margin-bottom: 0.5rem;
        }

        .time-block .time {
            font-weight: 700;
            color: var(--color-stone-600);
            min-width: 100px;
        }

        .time-block .content {
            flex-grow: 1;
        }

        .time-block.current {
            background: var(--color-primary-light);
            border: 2px solid var(--color-primary);
        }

        .time-block.completed {
            opacity: 0.5;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: white;
            border: 1px solid var(--color-stone-200);
            border-radius: var(--radius-lg);
            margin-bottom: 0.5rem;
        }

        .leaderboard-item .rank {
            font-size: 1.5rem;
            font-weight: 700;
            width: 2rem;
            text-align: center;
        }

        .leaderboard-item .name {
            flex-grow: 1;
            font-weight: 500;
        }

        .leaderboard-item .score {
            font-weight: 700;
            color: var(--color-primary);
        }

        .prize-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: white;
            border: 1px solid var(--color-stone-200);
            border-radius: var(--radius-lg);
            margin-bottom: 0.5rem;
        }

        .prize-item.drawn {
            opacity: 0.5;
            text-decoration: line-through;
        }

        /* Auth Screen */
        .auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #fdf2f4 0%, #ffe8d6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .auth-card {
            background: white;
            padding: 3rem;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .auth-card h2 {
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .text-error {
            color: #dc2626;
        }
    </style>
</head>

<body>
    <!-- Password Protection Screen -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
            <h2>講師後台</h2>
            <p class="text-sm text-stone-500 mb-4">請輸入密碼進入</p>
            <form onsubmit="checkPassword(event)">
                <input type="password" id="admin-password" class="form-input" placeholder="請輸入密碼" autofocus>
                <button type="submit" class="btn btn-primary btn-lg btn-full mt-6">進入後台</button>
            </form>
            <p id="auth-error" class="text-sm text-error mt-3" style="display: none;">密碼錯誤，請重試</p>
        </div>
    </div>

    <!-- Main Content (hidden until authenticated) -->
    <div id="admin-content" style="display: none;">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="container navbar-content">
                <div class="navbar-brand">
                    <span style="font-size: 1.5rem;">🎛️</span>
                    <h1>講師後台</h1>
                </div>
                <div class="navbar-links">
                    <span id="current-time" class="text-sm text-stone-500"></span>
                    <button onclick="logout()" class="btn btn-outline btn-sm">🚪 登出</button>
                    <a href="../index.html" class="btn btn-outline btn-sm">學員首頁</a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
            <!-- Settings Panel -->
            <div class="card mb-6">
                <div class="card-header">
                    <h3>⚙️ 系統設定</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">Google Apps Script 網址</label>
                        <input type="text" id="gas-url" class="form-input"
                            placeholder="https://script.google.com/macros/s/...">
                        <p class="text-xs text-stone-500 mt-1">用於問卷資料收集，請填入您的 GAS Web App URL</p>
                    </div>
                    <div class="form-group">
                        <label class="form-label">講義下載連結</label>
                        <input type="text" id="pdf-url" class="form-input" placeholder="https://...">
                    </div>

                    <button onclick="saveSettings()" class="btn btn-primary">💾 儲存設定</button>
                </div>
            </div>
    </div>
    </div>

    <!-- Stats Overview -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="stat-card">
            <div class="value" id="stat-total">0</div>
            <div class="label">總參加人數</div>
        </div>
        <div class="stat-card">
            <div class="value" id="stat-guests">0</div>
            <div class="label">新朋友</div>
        </div>
        <div class="stat-card">
            <div class="value" id="stat-members">0</div>
            <div class="label">夥伴</div>
        </div>
        <div class="stat-card">
            <div class="value" id="stat-surveys">0</div>
            <div class="label">已填問卷</div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Left Column -->
        <div>
            <!-- Time Schedule -->
            <div class="card mb-6">
                <div class="card-header">
                    <h3>⏱️ 課程時間表</h3>
                </div>
                <div class="card-body" id="schedule-container">
                    <!-- Will be populated by JS -->
                </div>
            </div>

            <!-- Social Challenge Leaderboard -->
            <div class="card mb-6">
                <div class="card-header" style="background: var(--color-accent-light);">
                    <h3>🏆 社群人氣王排行榜</h3>
                </div>
                <div class="card-body">
                    <div id="leaderboard">
                        <div class="text-center text-stone-500 p-4">
                            尚無資料，請手動新增
                        </div>
                    </div>
                    <div class="mt-4">
                        <div class="flex gap-2">
                            <input type="text" id="new-name" class="form-input" placeholder="姓名">
                            <input type="number" id="new-likes" class="form-input" placeholder="讚數"
                                style="width: 100px;">
                            <button onclick="addLeaderboardEntry()" class="btn btn-accent">新增</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <!-- Prize Draw -->
            <div class="card mb-6">
                <div class="card-header" style="background: var(--color-primary-light);">
                    <h3>🎰 抽獎管理</h3>
                </div>
                <div class="card-body">
                    <!-- 抽獎名單設定 -->
                    <div class="form-group mb-4">
                        <label class="form-label">🎫 參與抽獎名單 (每行一個姓名)</label>
                        <textarea id="participant-list" class="form-textarea" rows="5"
                            placeholder="請貼入參與抽獎的學員名單..."></textarea>
                        <p class="text-xs text-stone-500 mt-1">可以直接從 Excel 或 Google Sheets 複製姓名並貼上</p>
                    </div>

                    <div id="prize-list">
                        <!-- Default prizes -->
                    </div>
                    <div class="mt-4">
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="new-prize" class="form-input" placeholder="新增獎品名稱">
                            <button onclick="addPrize()" class="btn btn-outline">新增</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="syncFromGoogleSheets()" class="btn btn-secondary">
                                🔄 從 Google Sheets 更新
                            </button>
                            <button onclick="startPrizeDraw()" class="btn btn-primary">
                                🎲 開始抽獎
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="card mb-6">
                <div class="card-header">
                    <h3>⚡ 快速操作</h3>
                </div>
                <div class="card-body">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="resetAllProgress()" class="btn btn-outline">🔄 重置所有進度</button>
                        <button onclick="exportData()" class="btn btn-outline">📥 匯出資料</button>
                        <a href="../survey.html" target="_blank" class="btn btn-outline">📋 開啟問卷頁</a>
                        <a href="../index.html" target="_blank" class="btn btn-outline">🏠 開啟首頁</a>
                    </div>
                </div>
            </div>

            <!-- Satisfaction Chart -->
            <div class="card">
                <div class="card-header">
                    <h3>📊 滿意度概覽</h3>
                </div>
                <div class="card-body">
                    <canvas id="satisfaction-chart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>
    </main>

    <!-- Prize Draw Modal -->
    <div id="prize-modal"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;">
        <div
            style="background: white; border-radius: 1.5rem; padding: 3rem; max-width: 500px; width: 90%; text-align: center;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">🎰 抽獎中...</h2>
            <div id="prize-result" style="font-size: 6rem; margin: 2rem 0;">🎁</div>
            <p id="prize-winner" style="font-size: 2rem; font-weight: bold; color: var(--color-primary);">準備抽獎...
            </p>
            <p id="prize-name" style="font-size: 1.25rem; color: var(--color-stone-600); margin-top: 0.5rem;"></p>
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <button onclick="spinPrize()" class="btn btn-primary btn-lg" id="spin-btn">🎲 開始</button>
                <button onclick="closePrizeModal()" class="btn btn-outline btn-lg">關閉</button>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        // ========== 密碼保護功能 ==========
        const ADMIN_PASSWORD = '2026'; // 預設密碼，可在這裡修改
        const AUTH_KEY = 'workshop_admin_auth';

        function checkPassword(e) {
            e.preventDefault();
            const input = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('auth-error');

            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem(AUTH_KEY, 'true');
                showAdminContent();
            } else {
                errorEl.style.display = 'block';
                document.getElementById('admin-password').value = '';
            }
        }

        function showAdminContent() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem(AUTH_KEY);
            location.reload();
        }

        function checkAuth() {
            if (sessionStorage.getItem(AUTH_KEY) === 'true') {
                showAdminContent();
            }
        }

        // ========== 課程資料 ==========
        // Schedule data
        const schedule = [
            { time: '13:00 - 13:30', content: '開場/暖場/帳號設定', phase: 0 },
            { time: '13:30 - 14:00', content: '階段一：靈感發想', phase: 1 },
            { time: '14:00 - 14:40', content: '階段二：深度規劃', phase: 2 },
            { time: '14:40 - 15:00', content: '階段三：驗證防幻覺', phase: 3 },
            { time: '15:00 - 15:10', content: '☕ 休息', phase: 0 },
            { time: '15:10 - 16:00', content: '⭐ 階段四：視覺地圖+社群', phase: 4 },
            { time: '16:00 - 16:20', content: '階段五：現場生存', phase: 5 },
            { time: '16:20 - 16:30', content: '階段六：商業變現', phase: 6 },
            { time: '16:30 - 16:45', content: '社群人氣王統計', phase: 0 },
            { time: '16:45 - 17:00', content: '🎰 抽獎/Q&A/結尾', phase: 0 }
        ];

        // Default prizes
        let prizes = [
            { name: '日本零食包', emoji: '🎁', drawn: false },
            { name: '日本面膜組', emoji: '✨', drawn: false },
            { name: '日本文具', emoji: '📝', drawn: false },
            { name: 'Shop.com 禮券', emoji: '🎫', drawn: false },
            { name: '神秘大獎', emoji: '💝', drawn: false }
        ];

        // Leaderboard data
        let leaderboard = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth(); // 先檢查是否已登入
            loadSettings();
            renderSchedule();
            renderPrizes();
            renderLeaderboard();
            initChart();
            updateTime();
            setInterval(updateTime, 60000);
        });

        function loadSettings() {
            const HARDCODED_GAS_URL = 'https://script.google.com/macros/s/AKfycbxOi_q-LhAj56riAhb_ufn2Ks_-t_a6Cw3-13SyDFj2uRFMo66S719OM5cLQKCxXVC1/exec';
            const gasUrl = localStorage.getItem('workshop_gas_url') || HARDCODED_GAS_URL;
            const pdfUrl = localStorage.getItem('workshop_pdf_url') || 'handout.html';
            const participants = localStorage.getItem('workshop_participants');

            if (gasUrl) document.getElementById('gas-url').value = gasUrl;
            if (pdfUrl) document.getElementById('pdf-url').value = pdfUrl;
            if (participants) document.getElementById('participant-list').value = participants;

            // Load saved data
            const savedPrizes = localStorage.getItem('workshop_prizes');
            const savedLeaderboard = localStorage.getItem('workshop_leaderboard');
            if (savedPrizes) prizes = JSON.parse(savedPrizes);
            if (savedLeaderboard) leaderboard = JSON.parse(savedLeaderboard);
        }

        function saveSettings() {
            const gasUrl = document.getElementById('gas-url').value;
            const pdfUrl = document.getElementById('pdf-url').value;
            const participants = document.getElementById('participant-list').value;

            localStorage.setItem('workshop_gas_url', gasUrl);
            localStorage.setItem('workshop_pdf_url', pdfUrl);
            localStorage.setItem('workshop_participants', participants);

            // 同步更新記憶體中的狀態
            if (typeof WorkshopState !== 'undefined') {
                WorkshopState.gasUrl = gasUrl;
                WorkshopState.save();
            }

            showCopyToast('設定已儲存！');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent =
                now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

            // Update schedule highlighting
            renderSchedule();
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-container');
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            container.innerHTML = schedule.map((item, index) => {
                const [start] = item.time.split(' - ');
                const [startH, startM] = start.split(':').map(Number);
                const startMinutes = startH * 60 + startM;

                let className = 'time-block';
                if (currentMinutes >= startMinutes && index < schedule.length - 1) {
                    const nextStart = schedule[index + 1].time.split(' - ')[0];
                    const [nextH, nextM] = nextStart.split(':').map(Number);
                    const nextMinutes = nextH * 60 + nextM;
                    if (currentMinutes < nextMinutes) {
                        className += ' current';
                    } else if (currentMinutes >= nextMinutes) {
                        className += ' completed';
                    }
                }

                return `
                    <div class="${className}">
                        <div class="time">${item.time}</div>
                        <div class="content">${item.content}</div>
                    </div>
                `;
            }).join('');
        }

        function renderPrizes() {
            const container = document.getElementById('prize-list');
            container.innerHTML = prizes.map((prize, index) => `
                <div class="prize-item ${prize.drawn ? 'drawn' : ''}">
                    <span style="font-size: 1.5rem;">${prize.emoji}</span>
                    <span style="flex-grow: 1;">${prize.name}</span>
                    ${prize.winner ? `<span class="text-sm text-primary">🎉 ${prize.winner}</span>` : ''}
                    <button onclick="removePrize(${index})" class="btn btn-sm btn-outline">×</button>
                </div>
            `).join('');

            // Save to localStorage
            localStorage.setItem('workshop_prizes', JSON.stringify(prizes));
        }

        function addPrize() {
            const input = document.getElementById('new-prize');
            const name = input.value.trim();
            if (name) {
                prizes.push({ name, emoji: '🎁', drawn: false });
                input.value = '';
                renderPrizes();
            }
        }

        function removePrize(index) {
            prizes.splice(index, 1);
            renderPrizes();
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard');
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="text-center text-stone-500 p-4">尚無資料，請手動新增</div>';
                return;
            }

            // Sort by likes descending
            const sorted = [...leaderboard].sort((a, b) => b.likes - a.likes);
            const medals = ['🥇', '🥈', '🥉'];

            container.innerHTML = sorted.map((item, index) => `
                <div class="leaderboard-item">
                    <div class="rank">${medals[index] || (index + 1)}</div>
                    <div class="name">${item.name}</div>
                    <div class="score">${item.likes} 讚</div>
                    <button onclick="removeLeaderboardEntry(${index})" class="btn btn-sm btn-outline">×</button>
                </div>
            `).join('');

            localStorage.setItem('workshop_leaderboard', JSON.stringify(leaderboard));
        }

        function addLeaderboardEntry() {
            const nameInput = document.getElementById('new-name');
            const likesInput = document.getElementById('new-likes');
            const name = nameInput.value.trim();
            const likes = parseInt(likesInput.value) || 0;

            if (name) {
                leaderboard.push({ name, likes });
                nameInput.value = '';
                likesInput.value = '';
                renderLeaderboard();
            }
        }

        function removeLeaderboardEntry(index) {
            leaderboard.splice(index, 1);
            renderLeaderboard();
        }

        // Prize Draw Functions
        let currentPrize = null;

        function getParticipants() {
            const text = document.getElementById('participant-list').value;
            return text.split('\n').map(name => name.trim()).filter(name => name !== '');
        }

        function startPrizeDraw() {
            const participants = getParticipants();
            if (participants.length === 0) {
                alert('請先在設定中輸入參與抽獎的名單！');
                return;
            }

            // Find first undrawn prize
            currentPrize = prizes.find(p => !p.drawn);
            if (!currentPrize) {
                alert('所有獎品都已抽完！');
                return;
            }

            document.getElementById('prize-modal').style.display = 'flex';
            document.getElementById('prize-result').textContent = currentPrize.emoji;
            document.getElementById('prize-winner').textContent = '準備抽獎...';
            document.getElementById('prize-name').textContent = currentPrize.name;
        }

        async function syncFromGoogleSheets() {
            const gasUrl = document.getElementById('gas-url').value;
            if (!gasUrl) {
                alert('請先填寫 GAS 網址！');
                return;
            }

            showCopyToast('正在從雲端抓取資料...');

            try {
                const response = await fetch(`${gasUrl}?action=getConfig`);
                const config = await response.json();

                if (config.error) throw new Error(config.error);

                if (config.prizes && config.prizes.length > 0) {
                    prizes = config.prizes;
                    renderPrizes();
                }

                if (config.participants && config.participants.length > 0) {
                    document.getElementById('participant-list').value = config.participants.join('\n');
                    // 自動儲存到 LocalStorage
                    localStorage.setItem('workshop_participants', config.participants.join('\n'));
                }

                // 更新統計數據
                if (config.stats) {
                    updateDashboardStats(config.stats);
                }

                showCopyToast('✅ 同步成功！');
            } catch (err) {
                console.error('Sync error:', err);
                alert('同步失敗：' + err.message + '\n請確認 GAS 已重新部署且版本是最新的。');
            }
        }

        function updateDashboardStats(stats) {
            document.getElementById('stat-total').textContent = stats.total || 0;
            document.getElementById('stat-guests').textContent = stats.guests || 0;
            document.getElementById('stat-members').textContent = stats.members || 0;
            document.getElementById('stat-surveys').textContent = stats.total || 0;

            // 更新圖表
            if (window.satisfactionChart && stats.chartData) {
                window.satisfactionChart.data.datasets[0].data = stats.chartData;
                window.satisfactionChart.update();
            }
        }

        function spinPrize() {
            const participants = getParticipants();
            const resultEl = document.getElementById('prize-result');
            const winnerEl = document.getElementById('prize-winner');
            const spinBtn = document.getElementById('spin-btn');

            spinBtn.disabled = true;

            // Animation
            let spins = 0;
            const totalSpins = 20 + Math.floor(Math.random() * 10);

            const interval = setInterval(() => {
                const randomName = participants[Math.floor(Math.random() * participants.length)];
                winnerEl.textContent = randomName;
                resultEl.style.transform = `rotate(${spins * 36}deg)`;
                spins++;

                if (spins >= totalSpins) {
                    clearInterval(interval);
                    const winner = participants[Math.floor(Math.random() * participants.length)];
                    winnerEl.textContent = `🎉 ${winner}`;
                    resultEl.style.transform = 'rotate(0deg) scale(1.2)';

                    // Mark prize as drawn
                    currentPrize.drawn = true;
                    currentPrize.winner = winner;
                    renderPrizes();

                    spinBtn.disabled = false;
                    spinBtn.textContent = '🎲 繼續抽';
                }
            }, 80);
        }

        function closePrizeModal() {
            document.getElementById('prize-modal').style.display = 'none';
        }

        function resetAllProgress() {
            if (confirm('確定要重置所有學員進度嗎？這將清除所有 localStorage 資料。')) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportData() {
            const data = {
                leaderboard,
                prizes,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `workshop-data-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
        }

        function initChart() {
            const ctx = document.getElementById('satisfaction-chart').getContext('2d');
            window.satisfactionChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['整體滿意', 'AI 實用', '教學清晰', '推薦意願'],
                    datasets: [{
                        label: '平均分數 (5分制)',
                        data: [0, 0, 0, 0],
                        backgroundColor: [
                            '#be123c',
                            '#f59e0b',
                            '#22c55e',
                            '#3b82f6'
                        ],
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 5
                        }
                    }
                }
            });
        }
    </script>
    </div> <!-- Close admin-content -->
</body>

</html>
