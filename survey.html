<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">

        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .survey-form {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1), 0 10px 20px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* 背景設定 */
        body {
            background-image: url('image/banner-home.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .card-header::after {
            content: '';
            display: none;
        }

        .card-header .text-stone-500 {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        /* 選項樣式優化 */
        .rating-group-10 {
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: wrap !important;
            gap: 8px !important;
            justify-content: center !important;
        }

        .form-group {
            margin-bottom: 2.5rem !important;
        }

        .form-textarea {
            width: 100% !important;
        }

        .rating-btn-10 {
            width: 52px !important;
            height: 52px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 50% !important;
            padding: 0 !important;
            border: 2px solid #e8e8e8 !important;
            background: white !important;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            color: #333;
            transition: all 0.2s ease;
        }

        .rating-btn-10.selected {
            background: #ec4899 !important;
            /* Tailwind pink-500 */
            color: white !important;
            border-color: #ec4899 !important;
            transform: scale(1.1);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .checkbox-item {
            background: rgba(255, 255, 255, 0.6) !important;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .checkbox-item:hover {
            background: rgba(253, 242, 248, 0.8) !important;
            /* pink-50 */
            border-color: #fbcfe8;
            /* pink-200 */
        }

        .checkbox-item:has(input:checked) {
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%) !important;
            border-color: #ec4899 !important;
        }

        .form-input,
        .form-select,
        .form-textarea {
            border: 2px solid rgba(226, 232, 240, 0.8) !important;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 12px !important;
            padding: 0.75rem 1rem !important;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: #ec4899 !important;
            background: white;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15) !important;
            outline: none;
        }

        /* 緊湊型身分切換器 */
        .role-switcher {
            display: inline-flex !important;
            background: rgba(0, 0, 0, 0.2);
            padding: 3px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            align-self: flex-start;
        }

        .role-switcher button {
            background: transparent !important;
            border: none !important;
            color: rgba(255, 255, 255, 0.7) !important;
            padding: 5px 14px !important;
            border-radius: 50px !important;
            font-size: 0.75rem !important;
            font-weight: 600 !important;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .role-switcher button.active {
            background: white !important;
            color: #db2777 !important;
            /* pink-600 */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 480px) {
            .card-header-flex {
                flex-direction: column;
                gap: 12px;
            }

            .role-switcher {
                width: 100%;
            }

            .role-switcher button {
                flex: 1;
            }
        }

        /* 畫面切換與佈局修正 */
        .form-screen.hide {
            display: none !important;
        }

        .success-screen {
            display: none;
        }

        .success-screen.show {
            display: block !important;
        }

        .checkbox-group {
            display: flex !important;
            flex-direction: column !important;
            gap: 12px;
            width: 100%;
        }

        .checkbox-item {
            display: block !important;
            width: 100%;
            margin: 0 0 8px 0 !important;
            padding: 14px 18px !important;
            border-radius: 12px !important;
            cursor: pointer;
            box-sizing: border-box !important;
        }
    </style>
</head>

    <!-- Main Content -->
    <main class="container" style="padding-top: 6rem; padding-bottom: 6rem;">

                            style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;">

                                </p>
                            </div>
                            <div class="role-switcher">
                                <button onclick="switchRole('guest')" class="active" id="role-guest">👋 新朋友</button>
                                <button onclick="switchRole('member')" id="role-member">🤝 夥伴</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <form id="survey-form">
                            <!-- 0. 姓名 (共用) -->
                            <div class="form-group">
                                <label class="form-label">您的姓名</label>
                                <input type="text" id="name" class="form-input" placeholder="請輸入個人姓名" required>
                            </div>

                            <!-- ===== 新朋友版題目 ===== -->
                            <div id="guest-questions">

                                <div class="form-group">
                                    <label class="form-label">1. 邀請您參加的朋友是？</label>
                                    <input type="text" id="inviter" class="form-input" placeholder="請輸入邀請人姓名" required>
                                </div>

                                <!-- 1.5 吸收程度 (新增) -->
                                <div class="form-group">
                                    <label class="form-label">2. 您覺得自己今天對課程內容的吸收程度？ (1-5分)</label>
                                    <div class="rating-group-10" id="rating-absorption-guest">
                                        <button type="button" class="rating-btn-10" data-value="1">1</button>
                                        <button type="button" class="rating-btn-10" data-value="2">2</button>
                                        <button type="button" class="rating-btn-10" data-value="3">3</button>
                                        <button type="button" class="rating-btn-10" data-value="4">4</button>
                                        <button type="button" class="rating-btn-10" data-value="5">5</button>
                                    </div>
                                    <div class="text-center text-xs text-stone-500 mt-1">1=完全聽不懂 ~ 5=收穫滿滿，完全掌握</div>
                                </div>

                                <!-- 2. 整體評分 10分制 -->
                                <div class="form-group">
                                    <label class="form-label">3. 今天的 AI 旅遊規劃教學，滿分 5 分您給幾分？</label>
                                    <div class="rating-group-10" id="rating-overall">
                                        <button type="button" class="rating-btn-10" data-value="1">1</button>
                                        <button type="button" class="rating-btn-10" data-value="2">2</button>
                                        <button type="button" class="rating-btn-10" data-value="3">3</button>
                                        <button type="button" class="rating-btn-10" data-value="4">4</button>
                                        <button type="button" class="rating-btn-10" data-value="5">5</button>
                                    </div>
                                    <div class="text-center text-xs text-stone-500 mt-1">1=非常不滿意 ~ 5=非常滿意</div>
                                </div>

                                <!-- 3. Wow Moment -->
                                <div class="form-group">
                                    <label class="form-label">4. 今天哪個部分讓您覺得最驚艷 (Wow Moment)？</label>
                                    <select id="wow-moment" class="form-select">
                                        <option value="">請選擇</option>
                                        <option value="AI 一鍵自動排行程">AI 一鍵自動排行程 (Gemini)</option>
                                        <option value="用 AI 畫出自己的旅遊手繪地圖">用 AI 畫出自己的旅遊手繪地圖</option>
                                        <option value="讓 AI 幫行程配上 Podcast 語音導覽">讓 AI 幫行程配上 Podcast 語音導覽</option>
                                        <option value="設計自己的專屬旅遊海報">設計自己的專屬旅遊海報</option>
                                        <option value="消費轉收入概念">消費轉收入概念</option>
                                    </select>
                                </div>

                                <!-- 4. AI 興趣主題 -->
                                <div class="form-group">
                                    <label class="form-label">5. 未來若有其他生活應用主題，您對哪個感興趣？</label>

                                            <input type="checkbox" value="AI 健康管理 (減重/飲食)"> 🥗 AI 健康管理 (減重/飲食)
                                        </label>
                                        <label class="checkbox-item">
                                            <input type="checkbox" value="AI 繪圖創作 (頭貼/商品圖/Line貼圖)"> 🎨 AI 繪圖創作
                                            (頭貼/商品圖/Line貼圖)

                                        <label class="checkbox-item">
                                            <input type="checkbox" value="AI 網拍經營 (選品+上架+客服)"> 🛒 AI 網拍經營 (選品+上架+客服)
                                        </label>
                                        <label class="checkbox-item">
                                            <input type="checkbox" value="AI 生命靈數 (命盤解讀/流年運勢)"> 🔮 AI 生命靈數 (命盤解讀/流年運勢)
                                        </label>
                                        <label class="checkbox-item">
                                            <input type="checkbox" value="換季保養術"> 🧴 換季保養術
                                        </label>
                                        <label class="checkbox-item">
                                            <input type="checkbox" value="健康講座"> 🩺 健康講座
                                        </label>
                                    </div>
                                </div>

                                <!-- 5. Shop.com 興趣 -->
                                <div class="form-group">
                                    <label class="form-label">6. 今天的「消費轉收入」概念，您有興趣進一步了解嗎？</label>
                                    <select id="shopcom-interest" class="form-select">
                                        <option value="">請選擇</option>

                                        <button type="button" class="rating-btn-10" data-value="4">4</button>

                                    </div>

                                </div>

                            <!-- ===== 夥伴版題目 ===== -->

                                <div class="form-group">
                                    <label class="form-label">1. 今日活動流程順暢度</label>
                                    <select id="flow-rating" class="form-select">
                                        <option value="">請選擇</option>
                                        <option value="5">5 - 非常順暢</option>
                                        <option value="4">4 - 順暢</option>
                                        <option value="3">3 - 普通</option>
                                        <option value="2">2 - 有些卡頓</option>
                                        <option value="1">1 - 需要改進</option>
                                    </select>
                                </div>

                                <!-- 2. 吸收程度 (新增) -->
                                <div class="form-group">
                                    <label class="form-label">2. 您覺得自己今天對課程內容的吸收程度？ (1-5分)</label>
                                    <div class="rating-group-10" id="rating-absorption-member">
                                        <button type="button" class="rating-btn-10" data-value="1">1</button>
                                        <button type="button" class="rating-btn-10" data-value="2">2</button>
                                        <button type="button" class="rating-btn-10" data-value="3">3</button>
                                        <button type="button" class="rating-btn-10" data-value="4">4</button>
                                        <button type="button" class="rating-btn-10" data-value="5">5</button>
                                    </div>
                                    <div class="text-center text-xs text-stone-500 mt-1">1=完全聽不懂 ~ 5=收穫滿滿，完全掌握</div>
                                </div>

                                <!-- 3. AI 銜接 Shop.com 轉場 -->

                                    <label class="form-label">3. 關於「AI 技能」銜接 shop.com 事業」的轉場，您覺得？</label>
                                    <select id="transition-feedback" class="form-select">
                                        <option value="">請選擇</option>
                                        <option value="很自然，朋友不會覺得突兀">很自然，朋友不會覺得突兀</option>
                                        <option value="還可以，但可以更順一點">還可以，但可以更順一點</option>
                                        <option value="有點生硬，朋友可能會覺得在推銷">有點生硬，朋友可能會覺得在推銷</option>
                                    </select>
                                </div>

                                <!-- 4. 新朋友反應 -->
                                <div class="form-group">
                                    <label class="form-label">4. 您觀察到您帶來的新朋友，反應最熱烈的是？</label>
                                    <input type="text" id="guest-reaction" class="form-input"
                                        placeholder="例如：手繪地圖時大家都在驚呼...">
                                </div>

                                <!-- 5. 下次建議 -->
                                <div class="form-group">
                                    <label class="form-label">5. 下次舉辦的建議：</label>
                                    <textarea id="next-suggestion" class="form-textarea w-full" rows="4"
                                        placeholder="場地、時間、內容等任何建議..."></textarea>
                                </div>
                            </div>

                            <!-- 共用：社群人氣王讚數 -->
                            <div class="form-group">
                                <label class="form-label">您的社群人氣王貼文讚數 (選填)</label>
                                <input type="number" id="likes" class="form-input" placeholder="FB/IG 讚數">

                            <div class="font-bold mb-2 text-amber-800">🎰 抽獎資格</div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script>
        let currentRole = 'guest';
        const ratings = {
            overall: 0,
            recommend: 0,
            absorptionGuest: 0,
            absorptionMember: 0
        };

        // Initialize rating buttons (both 5-star and 10-point scales)
        function initRatingButtons() {
            document.querySelectorAll('.rating-group, .rating-group-10').forEach(group => {
                group.querySelectorAll('.rating-btn, .rating-btn-10').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const value = parseInt(btn.dataset.value);
                        const groupId = group.id.replace('rating-', '');

                        // Handle camelCase for absorption keys mapping
                        // id="rating-absorption-guest" -> groupId="absorption-guest"
                        // But we want "absorptionGuest" in ratings object
                        let targetKey = groupId;
                        if (groupId === 'absorption-guest') targetKey = 'absorptionGuest';
                        if (groupId === 'absorption-member') targetKey = 'absorptionMember';

                        ratings[targetKey] = value;

                        // Update UI
                        group.querySelectorAll('.rating-btn, .rating-btn-10').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                    });
                });
            });
        }

        function switchRole(role) {
            currentRole = role;

            // 更新按鈕狀態
            document.getElementById('role-guest').classList.toggle('active', role === 'guest');
            document.getElementById('role-member').classList.toggle('active', role === 'member');

            // 更新標題與副標題
            const header = document.querySelector('#form-header h3');
            const subtitle = document.querySelector('#form-header p');

            if (role === 'guest') {
                header.textContent = '🌸 新朋友體驗回饋';
                subtitle.textContent = '填完問卷即可領取完整講義！';
                subtitle.style.color = '#64748b';
            } else {
                header.textContent = '🤝 夥伴流程優化回饋';
                subtitle.textContent = '感謝您的協助，讓活動越來越好！';
                subtitle.style.color = '#64748b';
            }

            // 切換題目顯示
            document.getElementById('guest-questions').style.display = role === 'guest' ? 'block' : 'none';
            document.getElementById('member-questions').style.display = role === 'member' ? 'block' : 'none';

            // 動態處理必填屬性 (避免隱藏欄位阻礙提交)
            const inviterInput = document.getElementById('inviter');
            if (role === 'guest') {
                inviterInput.setAttribute('required', '');
            } else {
                inviterInput.removeAttribute('required');
            }
        }

        // Collect AI interests checkboxes
        function getSelectedInterests() {
            const checkboxes = document.querySelectorAll('#ai-interests input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value).join(', ');
        }

        // Form submission
        document.getElementById('survey-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            setButtonLoading(submitBtn, true);

            // 建立統一的資料結構，確保 Google Sheet 欄位不會錯亂
            // 順序：基本資料 -> 新朋友獨有 (1-7) -> 夥伴獨有 (1-5) -> 按讚
            let data = {
                // 1. 基本資料
                timestamp: new Date().toISOString(),
                role: currentRole === 'guest' ? '新朋友' : '夥伴',
                name: document.getElementById('name').value,

                // 2. 新朋友欄位 (1-7)
                inviter: currentRole === 'guest' ? document.getElementById('inviter').value : '',
                ratingAbsorptionGuest: currentRole === 'guest' ? ratings.absorptionGuest : '',
                ratingOverall: currentRole === 'guest' ? ratings.overall : '',
                wowMoment: currentRole === 'guest' ? document.getElementById('wow-moment').value : '',
                aiInterests: currentRole === 'guest' ? getSelectedInterests() : '',
                shopcomInterest: currentRole === 'guest' ? document.getElementById('shopcom-interest').value : '',
                ratingRecommend: currentRole === 'guest' ? ratings.recommend : '',

                // 3. 夥伴欄位 (1-5)
                flowRating: currentRole === 'member' ? document.getElementById('flow-rating').value : '',
                ratingAbsorptionMember: currentRole === 'member' ? ratings.absorptionMember : '',
                transitionFeedback: currentRole === 'member' ? document.getElementById('transition-feedback').value : '',
                guestReaction: currentRole === 'member' ? document.getElementById('guest-reaction').value : '',
                nextSuggestion: currentRole === 'member' ? document.getElementById('next-suggestion').value : '',

                // 4. 最後共用欄位
                likes: Number(document.getElementById('likes').value) || 0
            };

            // Submit to Google Sheets
            await submitToGoogleSheets(data,
                () => {
                    // Success
                    document.getElementById('form-screen').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                    WorkshopState.surveySubmitted = true;
                    WorkshopState.save();
                },
                (error) => {
                    // Error
                    setButtonLoading(submitBtn, false);
                    alert(error || '提交失敗，請稍後再試。');
                }
            );
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initRatingButtons();

            // 如果已經提交過，且非強制重新填寫，可以顯示成功畫面 (可選)
            /*
            if (WorkshopState.surveySubmitted) {
                document.getElementById('form-screen').classList.add('hide');
                document.getElementById('success-screen').classList.add('show');
            }
            */
        });
    </script>
</body>

</html>
