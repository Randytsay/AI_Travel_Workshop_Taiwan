  <script>
    function createSakura() {
      const sakura = document.createElement('div');
      sakura.className = 'sakura';
      sakura.innerHTML = '?Ңё';
      sakura.style.left = Math.random() * 100 + 'vw';
      sakura.style.fontSize = (Math.random() * 15 + 10) + 'px';
      sakura.style.animationDuration = (Math.random() * 5 + 8) + 's';
      sakura.style.opacity = Math.random() * 0.6 + 0.4;
      document.body.appendChild(sakura);

      setTimeout(() => {
        sakura.remove();
      }, 13000);
    }

    setInterval(createSakura, 800);

    const form = document.getElementById('surveyForm');
    const checkboxes = document.querySelectorAll('input[name="entry.118266493"]');
    const checklistError = document.getElementById('checklistError');
    const formContent = document.getElementById('formContent');
    const thankYouPage = document.getElementById('thankYouPage');
    const teamOtherRadio = document.getElementById('teamOther');
    const teamOtherInput = document.getElementById('teamOtherInput');
    const teamRadios = document.querySelectorAll('input[name="entry.869461559"]');

    function toggleTeamOtherInput() {
      if (teamOtherRadio.checked) {
        teamOtherInput.style.display = 'block';
        teamOtherInput.setAttribute('required', 'true');
      } else {
        teamOtherInput.style.display = 'none';
        teamOtherInput.removeAttribute('required');
        teamOtherInput.value = '';
      }
    }

    teamRadios.forEach(radio => {
      radio.addEventListener('change', toggleTeamOtherInput);
    });

    function allCheckboxesChecked() {
      return Array.from(checkboxes).every(cb => cb.checked);
    }

    checkboxes.forEach(cb => {
      cb.addEventListener('change', () => {
        if (allCheckboxesChecked()) {
          checklistError.classList.remove('show');
        }
      });
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      if (!allCheckboxesChecked()) {
        checklistError.classList.add('show');
        document.getElementById('checklistGroup').scrollIntoView({ behavior: 'smooth', block: 'center' });
        return false;
      }

      const formData = new FormData(form);

      // Add sentinels for Google Form compatibility
      formData.append('entry.869461559_sentinel', '');
      formData.append('entry.1565805686_sentinel', '');
      formData.append('entry.551668877_sentinel', '');
      formData.append('entry.118266493_sentinel', '');

      // Handle the "Other" option for the team name
      if (teamOtherRadio.checked) {
        formData.set('entry.869461559', '__other_option__');
        formData.set('entry.869461559.other_option_response', teamOtherInput.value);
      }

      fetch('https://docs.google.com/forms/d/e/1FAIpQLSe0n22xNeCaO3hFpqHkiwoUANxEn5uvHbeY8an-qBr8PA8GrQ/formResponse', {
        method: 'POST',
        body: formData,
        mode: 'no-cors'
      }).then(() => {
        formContent.classList.add('hide');
        thankYouPage.classList.add('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }).catch(() => {
        formContent.classList.add('hide');
        thankYouPage.classList.add('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  </script>
